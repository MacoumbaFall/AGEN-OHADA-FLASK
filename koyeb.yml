# Koyeb deployment configuration
# This file tells Koyeb how to build and run the application.
# It uses the Dockerfile at the project root.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    # The command to start the Flask app in production
    # gunicorn is used for better performance.
    command: gunicorn -b 0.0.0.0:${PORT:-8080} wsgi:app
    # Expose the HTTP port (Koyeb will map it automatically)
    ports:
      - "${PORT:-8080}:8080"
    # Environment variables – keep secrets out of the repo.
    env:
      - name: FLASK_ENV
        value: production
      - name: DATABASE_URL
        value: ${DATABASE_URL}
      - name: SECRET_KEY
        value: ${SECRET_KEY}
    # Auto‑scale settings (optional)
    scaling:
      min_instances: 1
      max_instances: 3
      cpu: 0.5
      memory: 256Mi
